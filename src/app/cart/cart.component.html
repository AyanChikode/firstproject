<h1 class="mb-5 text-center">Your Shopping Cart</h1>

<div class="container py-5">

  <div class="row">

    <!-- Left Side -->
    <div class="col-lg-8">

      <!-- Empty Cart -->
      <div *ngIf="cartItems.length == 0" class="text-center py-5">
        <h3>Your Cart is Empty</h3>
        <a routerLink="/allproducts" class="btn btn-primary mt-3">
          Continue Shopping
        </a>
      </div>

      <!-- Cart Items -->
      <div *ngIf="cartItems.length > 0">

        <div class="card mb-4">
          <div class="card-body">

            <div class="row cart-item mb-3"
              *ngFor="let item of cartItems; let i = index">

              <div class="col-md-3">
                <img [src]="item.image"
                  class="img-fluid rounded"
                  style="height:100px; object-fit:contain;">
              </div>

              <div class="col-md-5">
                <h5 class="card-title">{{item.title}}</h5>
                <p class="text-muted">{{item.category}}</p>
              </div>

<div class="input-group">

  <button class="btn btn-outline-secondary btn-sm"
    (click)="decreaseQty(item)">
    -
  </button>

  <input
    type="text"
    class="form-control text-center"
    [value]="item.quantity"
    readonly>

  <button class="btn btn-outline-secondary btn-sm"
    (click)="increaseQty(item)">
    +
  </button>

</div>

              <div class="col-md-2 text-end">

                    <p class="fw-bold">
                    {{item.price * item.quantity | currency:'INR'}}
                    </p>

                <button class="btn btn-sm btn-outline-danger"
                  (click)="removeItem(i)">
                  <i class="bi bi-trash"></i>
                </button>

              </div>

              <hr class="mt-3">

            </div>

          </div>
        </div>

        <!-- Continue Shopping -->
        <div class="text-start mb-4">
          <a routerLink="/allproducts"
            class="btn btn-outline-primary">
            <i class="bi bi-arrow-left me-2"></i>
            Continue Shopping
          </a>
        </div>

      </div>

    </div>

    <!-- Right Side -->
    <div class="col-lg-4">

      <!-- Summary -->
      <div class="card shadow">

        <div class="card-body">

          <h5 class="card-title mb-4">Order Summary</h5>

          <div class="d-flex justify-content-between mb-3">
            <span>Subtotal</span>
            <strong>{{total | currency:'INR'}}</strong>
          </div>

          <div class="d-flex justify-content-between mb-3">
            <span>Shipping</span>
            <span>₹100</span>
          </div>

          <div class="d-flex justify-content-between mb-3">
            <span>Tax</span>
            <span>₹50</span>
          </div>

          <hr>

          <div class="d-flex justify-content-between mb-4">
            <strong>Total</strong>
            <strong>{{total + 150 | currency:'INR'}}</strong>
          </div>

          <button class="btn btn-primary w-100">
            Proceed to Checkout
          </button>

        </div>

      </div>

      <!-- Promo -->
      <div class="card mt-4">

        <div class="card-body">

          <h5 class="card-title mb-3">
            Apply Promo Code
          </h5>

          <div class="input-group">

            <input type="text"
              class="form-control"
              placeholder="Enter promo code">

            <button class="btn btn-outline-secondary">
              Apply
            </button>

          </div>

        </div>

      </div>

    </div>

  </div>

</div>
