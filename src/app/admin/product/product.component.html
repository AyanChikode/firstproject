<div class="container mt-4 product-card">

  <!-- Header -->
  <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">

    <h5 class="page-title mb-0">
      PRODUCT LIST
    </h5>

  </div>

  <!-- Table -->
  <div class="table-responsive">

    <table class="table custom-table align-middle">

      <thead>
        <tr>
          <th>Id</th>
          <th>Image</th>
          <th>Title</th>
          <th>Price</th>
          <th>Brand</th>
          <th>Category</th>
          <th width="170">Action</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let p of products; let i = index">

          <td class="fw-semibold">{{ i + 1 }}</td>

          <!-- Image -->
          <td>
            <img 
              [src]="p.image" 
              alt="{{ p.title }}" 
              width="60" 
              height="60"
              class="rounded shadow-sm object-fit-cover">
          </td>

          <td class="fw-semibold">
            {{ p.title }}
          </td>

          <td class="fw-semibold">
            ₹{{ p.price }}
          </td>

          <td>
            <span class="fw-semibold">
              {{ p.brand }}
            </span>
          </td>

          <td class="fw-semibold">
            {{ p.category }}
          </td>

          <td class="fw-semibold">

            <button 
              class="btn btn-sm btn-outline-warning rounded-pill px-4 py-2 fw-semibold shadow-sm me-2"
              (click)="onEdit(p.id!)">
              Edit
            </button>

            <button 
              class="btn btn-sm btn-outline-danger rounded-pill fw-semibold shadow-sm"
              (click)="onDelete(p.id!)">
              Delete
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
