<h2 class="page-title">All Products</h2>

<div class="container py-4">
  <div class="row g-4">

    <div class="col-lg-3 col-md-4 col-sm-6" *ngFor="let p of products">

      <div class="card product-card h-100">

        <!-- Product Link -->
        <a [routerLink]="['/productsinfo', p.id]" class="product-link text-decoration-none">

          <div class="product-img-box">
            <img [src]="p.image" class="product-img" alt="Product Image">
          </div>

          <div class="card-body text-center">

            <h6 class="product-title">
              {{p.title}}
            </h6>

            <p class="product-price">
              {{p.price | currency:'INR'}}
            </p>

            <button
              class="btn btn-outline-warning rounded-pill px-4 py-2 mb-2 fw-semibold shadow-sm">
              View Product
            </button>

          </div>
        </a>

        <!-- Add To Cart -->
        <div class="text-center pb-3">
          <button
            class="btn btn-warning rounded-pill px-4 py-2 fw-semibold shadow-sm"
            (click)="addToCart(p)">
            Add To Cart
          </button>
        </div>

      </div>

    </div>

  </div>
</div>
