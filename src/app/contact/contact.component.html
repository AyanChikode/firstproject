<!-- contact.component.html -->
<section class="contact-section py-5">
  <div class="container">

    <!-- Heading -->
    <div class="text-center mb-5">
      <h2 class="fw-bold text-dark">Need Help?</h2>
      <p class="text-muted">
        Our support team is always ready to help you with your queries.
      </p>
      <hr class="w-25 mx-auto border-warning border-3">
    </div>

    <div class="row g-4">

      <!-- Left Side -->
      <div class="col-lg-6">
        <div class="contact-info h-100 p-4">

          <h3 class="text-warning fw-bold mb-4">Get in Touch</h3>

          <div class="mb-4">
            <h5 class="fw-bold">Address</h5>
            <p class="text-muted">Nagpur, Maharashtra, India</p>
          </div>

          <div class="mb-4">
            <h5 class="fw-bold">Phone</h5>
            <p class="text-muted">+91 98765 43210</p>
          </div>

          <div class="mb-4">
            <h5 class="fw-bold">Email</h5>
            <p class="text-muted">support@shopmart.com</p>
          </div>

          <div>
            <h5 class="fw-bold">Opening Hours</h5>
            <p class="text-muted mb-1">Mon - Fri : 9AM - 6PM</p>
            <p class="text-muted">Sat - Sun : 10AM - 4PM</p>
          </div>

        </div>
      </div>

      <!-- Right Side Form -->
      <div class="col-lg-6">
        <div class="contact-form p-4">

          <form #contactForm="ngForm" (ngSubmit)="submitForm(contactForm)">

            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input 
                type="text" 
                class="form-control"
                name="fullname"
                ngModel
                required>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Email</label>
                <input 
                  type="email"
                  class="form-control"
                  name="email"
                  ngModel
                  required>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Phone</label>
                <input 
                  type="text"
                  class="form-control"
                  name="phone"
                  ngModel>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Subject</label>
              <input 
                type="text"
                class="form-control"
                name="subject"
                ngModel
                required>
            </div>

            <div class="mb-3">
              <label class="form-label">Message</label>
              <textarea 
                rows="4"
                class="form-control"
                name="message"
                ngModel
                required></textarea>
            </div>

            <button class="btn btn-warning w-100 text-white fw-bold">
              Send Message
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>
</section>
